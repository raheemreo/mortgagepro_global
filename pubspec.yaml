name: mortgagepro_global
description: MortgageProGlobal — Global Mortgage Calculator Suite for 8 Countries
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter

  # ── Firebase ────────────────────────────────────────────────────────────────
  # Upgrade all firebase_* packages together — they share a version contract.
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.4
  cloud_firestore: ^5.2.1
  firebase_storage: ^12.1.2
  firebase_remote_config: ^5.1.3
  firebase_analytics: ^11.3.0
  firebase_crashlytics: ^4.1.0
  firebase_performance: ^0.10.0
  firebase_app_check: ^0.3.1+2
  firebase_messaging: ^15.0.3
  firebase_in_app_messaging: ^0.8.1+10
  # ── Ads ─────────────────────────────────────────────────────────────────────
  # Ceiling locked at <6.0.0 — onPaidEvent API changed in v6.x.
  # native_ad_widget.dart uses the v5.x NativeAdListener signature.
  # Update native_ad_widget.dart BEFORE upgrading past this ceiling.
  google_mobile_ads: '>=5.3.1 <6.0.0'
  app_tracking_transparency: ^2.0.4

  # ── State Management ────────────────────────────────────────────────────────
  # Upgrade flutter_riverpod + riverpod_annotation + riverpod_generator together.
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # ── Navigation ──────────────────────────────────────────────────────────────
  go_router: ^14.2.0

  # ── UI & Fonts ──────────────────────────────────────────────────────────────
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1

  # ── Charts ──────────────────────────────────────────────────────────────────
  fl_chart: ^0.68.0

  # ── Networking ──────────────────────────────────────────────────────────────
  dio: ^5.7.0
  connectivity_plus: ^6.0.0

  # ── Local Storage ───────────────────────────────────────────────────────────
  shared_preferences: ^2.3.1
  hive_flutter: ^1.1.0

  # ── Animations ──────────────────────────────────────────────────────────────
  lottie: ^3.1.2

  # ── PDF ─────────────────────────────────────────────────────────────────────
  pdf: ^3.11.1
  printing: ^5.13.1

  # ── Utils ───────────────────────────────────────────────────────────────────
  intl: ^0.19.0
  url_launcher: ^6.3.0
  share_plus: ^10.0.0
  package_info_plus: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  # Upgrade build_runner + riverpod_generator together.
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/lottie/
    - assets/images/
    - Lenders/

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/images/app_icon.png"       # plain icon, no adaptive
  # Remove adaptive_icon_background and adaptive_icon_foreground entirely
  web:
    generate: true
    image_path: "assets/images/app_icon.png"
    background_color: "#0B1D3A"
    theme_color: "#0B1D3A"
  windows:
    generate: true
    image_path: "assets/images/app_icon.png"
  macos:
    generate: true
    image_path: "assets/images/app_icon.png"
  min_sdk_android: 21