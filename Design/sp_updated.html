<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>MortgagePro Global — Responsive Splash</title>

  <style>
    /* ══════════════════════════════════════════════
   MORTGAGEPRO GLOBAL — RESPONSIVE SPLASH SCREEN
   Aesthetic: Premium Dark Navy Blue & Gold · Elite Fintech
══════════════════════════════════════════════ */
    :root {
      --bg-main: #082A73;
      --bg-gradient-top: #123F9A;
      --bg-gradient-bottom: #051E5A;
      --card-bg: #2A4A8D;
      --gold: #F4C430;
      --gold-bar: #F4D03F;
      --gold-glow: #FFD84D;
      --text-primary: #FFFFFF;
      --text-secondary: #C8D0E0;
      --text-muted: #AAB3C5;
      --track-bg: #5B6B8F;
      --white-card: rgba(42, 74, 141, 0.45);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      background: #0B1329;
      overflow: hidden;
      /* Lock viewport for app-like feel */
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
    }

    /* ═══ RESPONSIVE SPLASH CONTAINER ═══ */
    .splash {
      width: 100%;
      max-width: 500px;
      /* Increased from 430px for better tablet/desktop flexibility */
      height: 100dvh;
      position: relative;
      overflow: hidden;
      background: linear-gradient(180deg, var(--bg-gradient-top) 0%, var(--bg-main) 50%, var(--bg-gradient-bottom) 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      box-shadow: 0 24px 64px rgba(0, 0, 0, 0.5);
      transition: max-width 0.3s ease;
    }

    /* Landscape orientation adjustment to prevent vertical clipping */
    @media (max-height: 600px) {
      .splash {
        justify-content: flex-start;
        padding-top: 20px;
        overflow-y: auto;
      }

      .logo-mark {
        margin-bottom: 16px !important;
      }

      .flags-row {
        margin: 16px 0 !important;
      }

      .wordmark {
        transform: scale(0.9);
      }
    }

    /* ═══ LAYERED BACKGROUNDS ═══ */
    .bg-base,
    .bg-aurora,
    .bg-glow-gold,
    .financial-chart,
    .bg-flags-watermark,
    .particles {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .bg-base {
      background: radial-gradient(circle at 50% 35%, rgba(244, 196, 48, 0.04) 0%, transparent 70%);
    }

    .bg-aurora {
      background: radial-gradient(ellipse 60% 40% at 50% 10%, rgba(18, 63, 154, 0.3) 0%, transparent 70%);
    }

    /* ═══ FINTECH ELEMENTS ═══ */
    .financial-chart {
      z-index: 2;
      opacity: 0.45;
    }

    .bg-flags-watermark {
      z-index: 3;
      opacity: 0.12;
    }

    .wm-flag {
      position: absolute;
      width: clamp(32px, 8vw, 54px);
    }

    .wmf-us {
      top: 12%;
      left: 5%;
    }

    .wmf-ca {
      top: 22%;
      right: 5%;
    }

    .wmf-uk {
      top: 40%;
      left: 4%;
    }

    .wmf-eu {
      top: 35%;
      right: 6%;
    }

    .wmf-nz {
      top: 56%;
      right: 4%;
    }

    .wmf-in {
      top: 66%;
      left: 5%;
    }

    .wmf-au {
      top: 78%;
      right: 6%;
    }

    .world-map {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -54%);
      width: 90%;
      max-width: 420px;
      height: auto;
      opacity: 0.22;
      z-index: 4;
    }

    /* ═══ CONTENT ═══ */
    .content {
      position: relative;
      z-index: 30;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 0 20px;
      width: 100%;
    }

    .logo-mark {
      margin-bottom: 24px;
      animation: logoIn 0.8s cubic-bezier(0.15, 1, 0.3, 1) 0.3s both;
    }

    .logo-ring {
      width: 76px;
      height: 76px;
      border-radius: 20px;
      background: linear-gradient(135deg, var(--card-bg) 0%, var(--bg-gradient-bottom) 100%);
      border: 1px solid rgba(244, 196, 48, 0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(8px);
    }

    .brand-name {
      font-size: clamp(2rem, 8vw, 2.5rem);
      font-weight: 900;
      letter-spacing: -1.2px;
      color: var(--text-primary);
    }

    .brand-name .pro {
      color: var(--gold);
    }

    .brand-sub {
      font-size: 0.8rem;
      font-weight: 800;
      letter-spacing: 0.4rem;
      text-transform: uppercase;
      color: var(--gold);
      margin-top: 0.5rem;
    }

    .tagline {
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--text-secondary);
      margin: 1rem 0;
      max-width: 280px;
    }

    /* ═══ FLAGS ═══ */
    .flags-row {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 6px;
      margin: 20px 0;
      max-width: 320px;
    }

    .flag-pill {
      font-size: 0.6rem;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 6px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: var(--white-card);
      color: var(--text-primary);
    }

    /* ═══ LOADING ═══ */
    .loading-wrap {
      width: 80%;
      max-width: 200px;
    }

    .loading-track {
      height: 3px;
      background: var(--track-bg);
      border-radius: 2px;
      overflow: hidden;
    }

    .loading-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--gold-bar), var(--gold-glow));
      border-radius: 2px;
      animation: loadFill 3.2s cubic-bezier(0.15, 1, 0.3, 1) 1.1s both;
    }

    .version-tag {
      position: absolute;
      bottom: 20px;
      font-size: 0.55rem;
      letter-spacing: 0.1rem;
      color: var(--text-muted);
      text-transform: uppercase;
    }

    /* ═══ KEYFRAMES ═══ */
    @keyframes logoIn {
      0% {
        opacity: 0;
        transform: translateY(-8px) scale(0.96);
      }

      100% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes loadFill {
      0% {
        width: 0%;
      }

      100% {
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <div class="splash">
    <div class="bg-base"></div>
    <div class="bg-aurora"></div>
    <div class="financial-chart">
      <svg viewBox="0 0 420 896" preserveAspectRatio="xMidYMid slice">
        <path d="M -20 740 Q 60 720 120 640 T 260 550 T 380 340 T 460 210" stroke="rgba(255, 255, 255, 0.06)"
          stroke-width="2" fill="none" />
      </svg>
    </div>

    <div class="content">
      <div class="logo-mark">
        <div class="logo-ring">
          <div style="color:var(--gold); font-size: 32px;">⌂</div>
        </div>
      </div>

      <div class="wordmark">
        <div class="brand-name">Mortgage<span class="pro">Pro</span></div>
        <div class="brand-sub">Global</div>
      </div>

      <div class="tagline">
        Your world of mortgages,<br>calculated with precision
      </div>

      <div class="flags-row">
        <div class="flag-pill">USA 🇺🇸</div>
        <div class="flag-pill">CAN 🇨🇦</div>
        <div class="flag-pill">GBR 🇬🇧</div>
        <div class="flag-pill">AUS 🇦🇺</div>
        <div class="flag-pill">NZL 🇳🇿</div>
        <div class="flag-pill">IND 🇮🇳</div>
        <div class="flag-pill">EUR 🇪🇺</div>
      </div>

      <div class="loading-wrap">
        <div class="loading-track">
          <div class="loading-fill"></div>
        </div>
      </div>
    </div>

    <div class="version-tag">REO TECHNOLOGIES · Version 1.0.0</div>
  </div>

  <script>
    // Simple loop to ensure mobile heights are updated on window resize
    const setVh = () => {
      let vh = window.innerHeight * 0.01;
      document.documentElement.style.setProperty('--vh', `${vh}px`);
    };
    window.addEventListener('resize', setVh);
    setVh();
  </script>
</body>

</html>
