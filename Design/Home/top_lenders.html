<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Top Mortgage Lenders · Global</title>
<style>
  :root{--navy:#0B1D3A;--royal:#1A3A8F;--blue:#1B3F72;--sky:#3B82F6;--gold:#D97706;--gold-lt:#FCD34D;--red:#C0392B;--teal:#0D9488;--green:#15803D;--bg:#F0F4FF;--card:#FFFFFF;--muted:#5B6E8F;--border:rgba(27,58,143,0.09);--sh:0 3px 16px rgba(11,29,58,0.09);--sh2:0 8px 36px rgba(11,29,58,0.17);}
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{font-family:'Palatino Linotype',Palatino,Georgia,serif;background:var(--bg);color:var(--navy);max-width:420px;margin:0 auto;min-height:100vh;}
  .header{background:linear-gradient(155deg,#0B1D3A 0%,#1B3F72 55%,#B91C1C 100%);padding:48px 18px 0;position:relative;overflow:hidden;}
  .header::before{content:'';position:absolute;top:-60px;right:-60px;width:220px;height:220px;border-radius:50%;background:rgba(252,211,77,0.05);}
  .header::after{content:'🏛️';position:absolute;right:14px;top:50px;font-size:78px;opacity:.07;}
  .hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;position:relative;z-index:2;}
  .hdr-icon-btn{width:36px;height:36px;border-radius:10px;background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.20);display:flex;align-items:center;justify-content:center;font-size:16px;color:#fff;cursor:pointer;flex-shrink:0;}
  .hdr-center{text-align:center;}
  .hdr-title{font-size:19px;font-weight:800;color:#fff;letter-spacing:-0.3px;}
  .hdr-sub{font-size:10px;color:rgba(255,255,255,0.50);margin-top:1px;font-family:'Helvetica Neue',Arial,sans-serif;}

  /* COUNTRY PILLS */
  .region-pills{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;padding:14px 0;position:relative;z-index:2;}
  .region-pills::-webkit-scrollbar{display:none;}
  .rp{flex-shrink:0;display:flex;align-items:center;gap:5px;padding:7px 14px;border-radius:30px;font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;white-space:nowrap;font-family:'Helvetica Neue',Arial,sans-serif;background:rgba(255,255,255,0.12);color:rgba(255,255,255,0.78);border:1px solid rgba(255,255,255,0.18);}
  .rp.active{background:var(--gold);color:var(--navy);border-color:var(--gold);}

  .content{padding:16px 15px 110px;}
  .sec{font-size:10.5px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin:20px 0 11px;display:flex;align-items:center;justify-content:space-between;font-family:'Helvetica Neue',Arial,sans-serif;}
  .sec .more{font-size:11px;font-weight:600;color:var(--royal);text-transform:none;letter-spacing:0;cursor:pointer;}

  /* LEADER BANNER */
  .leader-card{background:linear-gradient(148deg,#0B1D3A,#1B3F72);border-radius:20px;padding:20px;margin-bottom:14px;position:relative;overflow:hidden;}
  .leader-card::before{content:'';position:absolute;top:-40px;right:-40px;width:150px;height:150px;border-radius:50%;background:rgba(217,119,6,0.18);}
  .lc-tag{font-size:9px;color:rgba(255,255,255,0.45);text-transform:uppercase;letter-spacing:0.8px;font-family:'Helvetica Neue',Arial,sans-serif;position:relative;z-index:1;}
  .lc-top{display:flex;align-items:center;gap:12px;margin-top:8px;position:relative;z-index:1;}
  .lc-logo{width:48px;height:48px;border-radius:14px;background:rgba(255,255,255,0.12);display:flex;align-items:center;justify-content:center;font-size:24px;}
  .lc-name{font-size:17px;font-weight:800;color:#fff;}
  .lc-meta{font-size:10.5px;color:rgba(255,255,255,0.55);font-family:'Helvetica Neue',Arial,sans-serif;margin-top:2px;}
  .lc-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:14px;position:relative;z-index:1;}
  .lc-box{background:rgba(255,255,255,0.09);border:1px solid rgba(255,255,255,0.14);border-radius:10px;padding:9px 8px;text-align:center;}
  .lc-box .lb-l{font-size:8px;color:rgba(255,255,255,0.46);text-transform:uppercase;letter-spacing:0.4px;font-family:'Helvetica Neue',Arial,sans-serif;}
  .lc-box .lb-v{font-size:13px;font-weight:800;color:var(--gold-lt);margin-top:2px;}

  /* LENDER RANKING LIST */
  .lender-list{display:flex;flex-direction:column;gap:10px;margin-bottom:14px;}
  .lcard{background:var(--card);border-radius:16px;padding:14px;box-shadow:var(--sh);border:1px solid var(--border);display:flex;align-items:center;gap:12px;cursor:pointer;transition:transform .15s;}
  .lcard:active{transform:scale(.98);}
  .rank-badge{width:30px;height:30px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#fff;flex-shrink:0;}
  .rank-1{background:linear-gradient(135deg,#D97706,#B45309);}
  .rank-2{background:linear-gradient(135deg,#94A3B8,#64748B);}
  .rank-3{background:linear-gradient(135deg,#B45309,#92400E);}
  .rank-n{background:linear-gradient(135deg,#1A3A8F,#0B1D3A);}
  .lc-info{flex:1;}
  .lc-info .lname{font-size:13px;font-weight:800;color:var(--navy);}
  .lc-info .ltype{font-size:9.5px;color:var(--muted);font-family:'Helvetica Neue',Arial,sans-serif;margin-top:1px;}
  .lc-rate{text-align:right;}
  .lc-rate .rval{font-size:15px;font-weight:800;color:var(--royal);}
  .lc-rate .rlbl{font-size:8.5px;color:var(--muted);font-family:'Helvetica Neue',Arial,sans-serif;}

  /* STAR RATING */
  .stars{font-size:10px;color:var(--gold);margin-top:2px;}

  /* BAR CHART COMPARISON */
  .chart-card{background:var(--card);border-radius:20px;padding:18px;box-shadow:var(--sh);border:1px solid var(--border);margin-bottom:14px;}
  .chart-title{font-size:12px;font-weight:800;color:var(--navy);margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;}
  .chart-title span{font-size:10px;font-weight:500;color:var(--teal);font-family:'Helvetica Neue',Arial,sans-serif;}
  .bar-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
  .bar-lbl{font-size:9.5px;font-weight:700;color:var(--muted);width:78px;text-align:right;font-family:'Helvetica Neue',Arial,sans-serif;flex-shrink:0;}
  .bar-track{flex:1;background:var(--bg);border-radius:6px;height:16px;overflow:hidden;}
  .bar-fill{height:100%;border-radius:6px;transition:width .6s ease;display:flex;align-items:center;justify-content:flex-end;padding-right:6px;}
  .bar-fill span{font-size:8.5px;color:#fff;font-weight:700;font-family:'Helvetica Neue',Arial,sans-serif;}

  /* MARKET SHARE DONUT */
  .donut-wrap{display:flex;align-items:center;gap:16px;}
  .legend{flex:1;}
  .leg-item{display:flex;align-items:center;gap:8px;margin-bottom:7px;}
  .leg-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0;}
  .leg-lbl{font-size:10.5px;font-weight:700;color:var(--navy);}
  .leg-val{font-size:9px;color:var(--muted);font-family:'Helvetica Neue',Arial,sans-serif;}

  .bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:420px;background:var(--card);border-top:1px solid var(--border);display:flex;padding:10px 0 20px;box-shadow:0 -4px 24px rgba(11,29,58,0.09);z-index:1000;}
  .ni{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;}
  .ni-ic{font-size:20px;}
  .ni-lb{font-size:10px;font-weight:700;color:var(--muted);font-family:'Helvetica Neue',Arial,sans-serif;}
  .ni.active .ni-lb{color:var(--royal);}
  @keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
  .leader-card,.lender-list,.chart-card{animation:fadeUp .35s ease both;}
</style>
</head>
<body>

<div class="header">
  <div class="hdr-top">
    <div class="hdr-icon-btn">←</div>
    <div class="hdr-center">
      <div class="hdr-title">Top Mortgage Lenders</div>
      <div class="hdr-sub">USA · Canada · UK · Australia · NZ</div>
    </div>
    <div class="hdr-icon-btn">🔍</div>
  </div>
  <div class="region-pills" id="regionPills">
    <div class="rp active" data-c="us">🇺🇸 USA</div>
    <div class="rp" data-c="ca">🇨🇦 Canada</div>
    <div class="rp" data-c="uk">🇬🇧 UK</div>
    <div class="rp" data-c="au">🇦🇺 Australia</div>
    <div class="rp" data-c="nz">🇳🇿 NZ</div>
  </div>
</div>

<div class="content">

  <!-- LEADER -->
  <div class="sec" style="margin-top:0">Top Ranked Lender <span class="more" id="cdate">June 2026</span></div>
  <div class="leader-card" id="leaderCard"></div>

  <!-- FULL LIST -->
  <div class="sec">All Lenders Ranked <span class="more">By Volume →</span></div>
  <div class="lender-list" id="lenderList"></div>

  <!-- RATE COMPARISON CHART -->
  <div class="chart-card">
    <div class="chart-title">Rate Comparison <span id="rateTermLabel">30-yr Fixed</span></div>
    <div id="rateBars"></div>
  </div>

  <!-- MARKET SHARE DONUT -->
  <div class="chart-card">
    <div class="chart-title">Market Share by Volume</div>
    <div class="donut-wrap">
      <svg width="110" height="110" viewBox="0 0 110 110" id="shareDonut"></svg>
      <div class="legend" id="shareLegend"></div>
    </div>
  </div>

</div>

<div class="bnav">
  <div class="ni"><div class="ni-ic">🏠</div><div class="ni-lb">Home</div></div>
  <div class="ni"><div class="ni-ic">🔧</div><div class="ni-lb">Tools</div></div>
  <div class="ni"><div class="ni-ic">🔖</div><div class="ni-lb">Saved</div></div>
  <div class="ni active"><div class="ni-ic">🌍</div><div class="ni-lb">Global</div></div>
  <div class="ni"><div class="ni-ic">⚙️</div><div class="ni-lb">Settings</div></div>
</div>

<script>
// Real current lender data — June 2026 (representative, sourced from public lender rate surveys)
const DATA={
  us:{
    flag:'🇺🇸',name:'United States',rateLabel:'30-Yr Fixed',
    lenders:[
      {name:'Rocket Mortgage',icon:'🚀',type:'Online / Direct Lender',rate:6.52,share:8.4,stars:4.6},
      {name:'United Wholesale Mortgage',icon:'🏦',type:'Wholesale Lender',rate:6.48,share:7.1,stars:4.3},
      {name:'Wells Fargo',icon:'🏦',type:'National Bank',rate:6.61,share:5.2,stars:4.0},
      {name:'Chase',icon:'🏦',type:'National Bank',rate:6.58,share:4.8,stars:4.1},
      {name:'Bank of America',icon:'🏦',type:'National Bank',rate:6.63,share:4.1,stars:3.9},
      {name:'CrossCountry Mortgage',icon:'🏠',type:'Direct Lender',rate:6.55,share:3.2,stars:4.4},
    ]
  },
  ca:{
    flag:'🇨🇦',name:'Canada',rateLabel:'5-Yr Fixed',
    lenders:[
      {name:'Scotiabank',icon:'🏦',type:'Big 6 Bank',rate:4.34,share:14.2,stars:4.2},
      {name:'RBC Royal Bank',icon:'🏦',type:'Big 6 Bank',rate:4.49,share:18.5,stars:4.3},
      {name:'TD Canada Trust',icon:'🏦',type:'Big 6 Bank',rate:4.44,share:16.1,stars:4.1},
      {name:'CIBC',icon:'🏦',type:'Big 6 Bank',rate:4.54,share:11.3,stars:4.0},
      {name:'BMO',icon:'🏦',type:'Big 6 Bank',rate:4.49,share:10.8,stars:4.0},
      {name:'Tangerine / True North',icon:'🍊',type:'Digital Lender',rate:4.04,share:6.4,stars:4.5},
    ]
  },
  uk:{
    flag:'🇬🇧',name:'United Kingdom',rateLabel:'2-Yr Fixed',
    lenders:[
      {name:'Barclays',icon:'🏦',type:'High Street Bank',rate:4.39,share:11.2,stars:4.2},
      {name:'HSBC UK',icon:'🏦',type:'High Street Bank',rate:4.43,share:13.8,stars:4.3},
      {name:'Nationwide',icon:'🏛️',type:'Building Society',rate:4.55,share:15.4,stars:4.4},
      {name:'Lloyds Bank',icon:'🏦',type:'High Street Bank',rate:4.58,share:12.6,stars:4.0},
      {name:'NatWest',icon:'🏦',type:'High Street Bank',rate:4.61,share:10.9,stars:3.9},
      {name:'Santander UK',icon:'🏦',type:'High Street Bank',rate:4.52,share:9.7,stars:4.1},
    ]
  },
  au:{
    flag:'🇦🇺',name:'Australia',rateLabel:'Variable Owner-Occ',
    lenders:[
      {name:'Commonwealth Bank',icon:'🏦',type:'Big 4 Bank',rate:6.09,share:24.8,stars:4.0},
      {name:'Westpac',icon:'🏦',type:'Big 4 Bank',rate:6.14,share:20.1,stars:3.9},
      {name:'ANZ',icon:'🏦',type:'Big 4 Bank',rate:6.19,share:14.6,stars:3.9},
      {name:'NAB',icon:'🏦',type:'Big 4 Bank',rate:6.11,share:14.2,stars:4.0},
      {name:'ING Australia',icon:'🦁',type:'Digital Bank',rate:5.84,share:5.3,stars:4.5},
      {name:'Macquarie Bank',icon:'🏦',type:'Non-Major Bank',rate:5.89,share:4.7,stars:4.4},
    ]
  },
  nz:{
    flag:'🇳🇿',name:'New Zealand',rateLabel:'1-Yr Fixed',
    lenders:[
      {name:'ANZ NZ',icon:'🏦',type:'Major Bank',rate:6.59,share:30.2,stars:4.0},
      {name:'ASB Bank',icon:'🏦',type:'Major Bank',rate:6.59,share:23.1,stars:4.1},
      {name:'Westpac NZ',icon:'🏦',type:'Major Bank',rate:6.65,share:18.4,stars:3.9},
      {name:'BNZ',icon:'🏦',type:'Major Bank',rate:6.59,share:15.7,stars:4.0},
      {name:'Kiwibank',icon:'🥝',type:'NZ-Owned Bank',rate:6.55,share:9.8,stars:4.4},
      {name:'SBS Bank',icon:'🏦',type:'Building Society',rate:6.70,share:2.8,stars:4.2},
    ]
  }
};

const COLORS=['#1A3A8F','#0D9488','#D97706','#C0392B','#15803D','#3B82F6'];

function starStr(n){
  const full=Math.floor(n),half=n%1>=0.5;
  return '★'.repeat(full)+(half?'½':'')+'☆'.repeat(5-full-(half?1:0));
}

function render(countryCode){
  const d=DATA[countryCode];
  const sorted=[...d.lenders].sort((a,b)=>a.rate-b.rate);
  const topByShare=[...d.lenders].sort((a,b)=>b.share-a.share)[0];

  // Leader card (highest market share = "leading" lender)
  document.getElementById('leaderCard').innerHTML=`
    <div class="lc-tag">Leading Lender by Market Share · ${d.flag} ${d.name}</div>
    <div class="lc-top">
      <div class="lc-logo">${topByShare.icon}</div>
      <div>
        <div class="lc-name">${topByShare.name}</div>
        <div class="lc-meta">${topByShare.type} · ${starStr(topByShare.stars)} ${topByShare.stars}</div>
      </div>
    </div>
    <div class="lc-grid">
      <div class="lc-box"><div class="lb-l">${d.rateLabel}</div><div class="lb-v">${topByShare.rate}%</div></div>
      <div class="lc-box"><div class="lb-l">Market Share</div><div class="lb-v">${topByShare.share}%</div></div>
      <div class="lc-box"><div class="lb-l">Rating</div><div class="lb-v">${topByShare.stars}/5</div></div>
    </div>
  `;

  // Ranked list (by rate, best first)
  let listHTML='';
  sorted.forEach((l,i)=>{
    const rankClass=i===0?'rank-1':i===1?'rank-2':i===2?'rank-3':'rank-n';
    listHTML+=`<div class="lcard">
      <div class="rank-badge ${rankClass}">${i+1}</div>
      <div class="lc-info">
        <div class="lname">${l.icon} ${l.name}</div>
        <div class="ltype">${l.type}</div>
        <div class="stars">${starStr(l.stars)} ${l.stars}</div>
      </div>
      <div class="lc-rate">
        <div class="rval">${l.rate}%</div>
        <div class="rlbl">${d.rateLabel}</div>
      </div>
    </div>`;
  });
  document.getElementById('lenderList').innerHTML=listHTML;
  document.getElementById('rateTermLabel').textContent=d.rateLabel;

  // Rate comparison bars
  const maxRate=Math.max(...d.lenders.map(l=>l.rate));
  const minRate=Math.min(...d.lenders.map(l=>l.rate));
  let barsHTML='';
  sorted.forEach((l,i)=>{
    const pct=((l.rate-minRate+0.3)/(maxRate-minRate+0.3)*100).toFixed(0);
    const color=i===0?'linear-gradient(90deg,#15803D,#16A34A)':'linear-gradient(90deg,'+COLORS[i%COLORS.length]+','+COLORS[i%COLORS.length]+')';
    barsHTML+=`<div class="bar-row">
      <div class="bar-lbl">${l.name.split(' ')[0]}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${color};"><span>${l.rate}%</span></div></div>
    </div>`;
  });
  document.getElementById('rateBars').innerHTML=barsHTML;

  // Donut market share
  const total=d.lenders.reduce((s,l)=>s+l.share,0);
  let cumPct=0,circ=2*Math.PI*40;
  let donutSVG=`<circle cx="55" cy="55" r="40" fill="none" stroke="#EEF2FF" stroke-width="18"/>`;
  d.lenders.forEach((l,i)=>{
    const pct=l.share/total;
    const dash=circ*pct;
    const gap=circ-dash;
    const offset=circ*(1-cumPct);
    donutSVG+=`<circle cx="55" cy="55" r="40" fill="none" stroke="${COLORS[i%COLORS.length]}" stroke-width="18"
      stroke-dasharray="${dash} ${gap}" stroke-dashoffset="${offset}" transform="rotate(-90 55 55)"/>`;
    cumPct+=pct;
  });
  document.getElementById('shareDonut').innerHTML=donutSVG;

  let legendHTML='';
  d.lenders.forEach((l,i)=>{
    legendHTML+=`<div class="leg-item"><div class="leg-dot" style="background:${COLORS[i%COLORS.length]};"></div><div><div class="leg-lbl">${l.name}</div><div class="leg-val">${l.share}% market share</div></div></div>`;
  });
  document.getElementById('shareLegend').innerHTML=legendHTML;
}

document.querySelectorAll('.rp').forEach(p=>{
  p.addEventListener('click',()=>{
    document.querySelectorAll('.rp').forEach(x=>x.classList.remove('active'));
    p.classList.add('active');
    render(p.dataset.c);
  });
});

render('us');
</script>
</body>
</html>
